name: DisbandiOS
options:
  bundleIdPrefix: com.wsgpolar
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.20.0"

settings:
  base:
    MARKETING_VERSION: "0.4.4"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "KR54WPJ24G"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  DisbandiOS:
    type: application
    platform: iOS
    sources:
      - path: DisbandiOS
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: DisbandiOS/Resources/Info.plist
      properties:
        CFBundleDisplayName: Disband
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: Disband uses the camera for video calls and sending photos.
        NSMicrophoneUsageDescription: Disband uses the microphone for voice and video calls.
        NSPhotoLibraryUsageDescription: Disband needs photo access to share images in chat.
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wsgpolar.disband
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: DisbandiOS/DisbandiOS.entitlements
        # Manual App Store signing (preserved across `xcodegen generate`).
        # Simulator builds ignore these; device/archive builds use the
        # "Disband App Store" distribution profile created in the portal.
        CODE_SIGN_STYLE: Manual
        "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "Apple Distribution"
        "PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]": "Disband App Store"
