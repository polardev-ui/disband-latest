name: Release Desktop

# Builds installers when Prepare Release pushes a semver tag, or when run manually.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Semver tag to build (e.g. v0.4.2). Leave empty to build the branch below."
        required: false
        type: string
      ref:
        description: "Branch or commit to build when tag is empty"
        required: false
        type: string
        default: main

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && (inputs.tag || format('manual-{0}', inputs.ref)) || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS Apple Silicon
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS Intel
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve build target
        id: build
        env:
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_REF: ${{ inputs.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: node scripts/resolve-release-build.mjs --phase=pre

      - name: Checkout build ref
        if: steps.build.outputs.checkout_ref != github.ref_name
        run: git checkout "${{ steps.build.outputs.checkout_ref }}"

      - name: Resolve release tag from package.json
        if: steps.build.outputs.mode == 'branch'
        id: tag
        env:
          BUILD_MODE: branch
        run: node scripts/resolve-release-build.mjs --phase=post

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Sync version from tag
        if: steps.build.outputs.mode == 'tag'
        run: node scripts/set-version.mjs "${{ steps.build.outputs.release_tag }}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Pin time crate (0.3.50 breaks against time-macros on crates.io)
        working-directory: src-tauri
        run: cargo update -p time --precise 0.3.49

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
          NEXT_PUBLIC_SUPABASE_URL: https://mjqbrcabargylrimlafw.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qcWJyY2FiYXJneWxyaW1sYWZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMDU2MzQsImV4cCI6MjA5NzU4MTYzNH0.wPZ49DaEv_NDyXovBwLcgyeoHxnvuSEa693zOmGMBbM
          NEXT_PUBLIC_GITHUB_REPO: polardev-ui/disband-latest
          NEXT_PUBLIC_MEDIA_API_URL: https://api.wsgpolar.me/v1
          NEXT_PUBLIC_APP_URL: https://disband.wsgpolar.me
        with:
          tagName: ${{ steps.build.outputs.mode == 'branch' && steps.tag.outputs.name || steps.build.outputs.release_tag }}
          releaseName: Disband ${{ steps.build.outputs.mode == 'branch' && steps.tag.outputs.name || steps.build.outputs.release_tag }}
          releaseBody: |
            ## Disband ${{ steps.build.outputs.mode == 'branch' && steps.tag.outputs.name || steps.build.outputs.release_tag }}

            Desktop builds for macOS, Windows, and Linux.

            | Platform | File |
            | --- | --- |
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x64) |
            | Windows | `.exe` / `.msi` |
            | Linux | `.deb` / `.AppImage` |

            [All releases](https://github.com/${{ github.repository }}/releases)
          releaseDraft: false
          prerelease: ${{ steps.build.outputs.mode == 'branch' }}
          args: --target ${{ matrix.target }}
