name: Prepare Release

# On every push to main: bump patch semver, commit version files, push a unique v* tag.
# That tag automatically triggers "Release Desktop" to build and publish installers.
# Use "Run workflow" manually when you want a minor or major bump instead.

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".github/**"
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump for the next release"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

concurrency:
  group: prepare-release
  cancel-in-progress: true

jobs:
  bump:
    if: |
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Commit, tag, and push
        env:
          BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git checkout -B main origin/main

            VERSION=$(node scripts/next-release-version.mjs)
            TAG="v${VERSION}"
            node scripts/validate-release-tag.mjs "${TAG}"
            echo "Attempt ${attempt}: preparing ${TAG}"

            if git ls-remote --quiet --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "Tag ${TAG} already exists on origin — refreshing base and retrying..."
              sleep 2
              continue
            fi

            node scripts/set-version.mjs "${VERSION}"

            git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
            if git diff --staged --quiet; then
              echo "Version files already at ${VERSION} on main — nothing to do."
              exit 0
            fi

            git commit -m "chore(release): ${TAG}"
            git tag -a "${TAG}" -m "Disband ${TAG}"

            if git push origin HEAD:refs/heads/main && git push origin "refs/tags/${TAG}"; then
              echo "Released ${TAG}"
              exit 0
            fi

            echo "Push rejected (attempt ${attempt}), resetting and retrying..."
            git tag -d "${TAG}" 2>/dev/null || true
            git reset --hard origin/main

            if [ "${attempt}" -eq 5 ]; then
              echo "::error::Failed to push release after ${attempt} attempts."
              exit 1
            fi
            sleep 2
          done
