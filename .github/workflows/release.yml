name: Prepare Release

# Bumps the semver, commits version files, and pushes a new v* tag.
# That tag triggers "Release Desktop" to build and publish installers.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump for the next release"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compute next version
        id: ver
        env:
          BUMP: ${{ inputs.bump }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node scripts/next-release-version.mjs)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Next release: v${VERSION}"

      - name: Update version files
        run: node scripts/set-version.mjs "${{ steps.ver.outputs.version }}"

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore(release): ${{ steps.ver.outputs.tag }}"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin HEAD
          git push origin "${{ steps.ver.outputs.tag }}"
