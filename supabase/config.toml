# Disband — Supabase local config
# Hosted project: run `pnpm sync:auth-emails` to push templates to the dashboard.

project_id = "disband"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "https://disband-latest.vercel.app"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
# Minimum wait between auth emails to the same address (reduces accidental rate-limit hits)
max_frequency = "60s"
otp_length = 6
otp_expiry = 3600

[auth.email.template.confirmation]
subject = "Confirm your Disband account"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.magic_link]
subject = "Your Disband sign-in link"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.recovery]
subject = "Reset your Disband password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.invite]
subject = "You're invited to Disband"
content_path = "./supabase/templates/invite.html"

[auth.email.template.email_change]
subject = "Confirm your new Disband email"
content_path = "./supabase/templates/email_change.html"

[auth.email.template.reauthentication]
subject = "{{ .Token }} — your Disband verification code"
content_path = "./supabase/templates/reauthentication.html"
