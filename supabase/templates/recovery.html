<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset your Disband password</title>
</head>
<body style="margin:0;padding:0;background-color:#1e1f22;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#1e1f22;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background-color:#2b2d31;border-radius:12px;border:1px solid #1a1b1e;">
          <tr>
            <td style="padding:32px 32px 24px;text-align:center;background:linear-gradient(180deg,#5865f2 0%,#4752c4 100%);">
              <div style="display:inline-block;width:56px;height:56px;line-height:56px;border-radius:30%;background:rgba(255,255,255,0.15);color:#ffffff;font-size:28px;font-weight:900;">D</div>
              <p style="margin:16px 0 0;color:#ffffff;font-size:22px;font-weight:700;">Password reset</p>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <h1 style="margin:0 0 12px;color:#f2f3f5;font-size:20px;font-weight:700;">Reset your password</h1>
              <p style="margin:0 0 24px;color:#b5bac1;font-size:15px;line-height:1.6;">
                We received a request to reset the password for your Disband account (<strong style="color:#dbdee1;">{{ .Email }}</strong>).
              </p>
              <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 0 24px;">
                <tr>
                  <td style="border-radius:8px;background-color:#5865f2;">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 28px;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;">Choose a new password</a>
                  </td>
                </tr>
              </table>
              <p style="margin:0 0 16px;color:#949ba4;font-size:13px;">Or use this one-time code:</p>
              <p style="margin:0 0 24px;padding:12px 16px;background-color:#1e1f22;border-radius:8px;color:#f2f3f5;font-size:24px;font-weight:700;letter-spacing:6px;text-align:center;">{{ .Token }}</p>
              <p style="margin:0;color:#949ba4;font-size:12px;line-height:1.6;">If you didn't request a reset, you can safely ignore this email.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px;border-top:1px solid #1e1f22;text-align:center;">
              <p style="margin:0;color:#72767d;font-size:12px;">Disband — chat, voice, and communities</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
